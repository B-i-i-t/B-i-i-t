name: Update README cards

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-cards:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Generate profile card assets
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          mkdir -p profile

          python3 <<'PY'
          import html
          import json
          import os
          import urllib.request

          USERNAME = "B-i-i-t"
          TOKEN = os.environ["GITHUB_TOKEN"]


          def github_api(url):
              request = urllib.request.Request(
                  url,
                  headers={
                      "Accept": "application/vnd.github+json",
                      "Authorization": f"Bearer {TOKEN}",
                      "User-Agent": f"{USERNAME}-readme-card-generator",
                      "X-GitHub-Api-Version": "2022-11-28",
                  },
              )
              with urllib.request.urlopen(request, timeout=30) as response:
                  return json.loads(response.read().decode("utf-8"))


          repos = []
          page = 1
          while True:
              data = github_api(
                  f"https://api.github.com/users/{USERNAME}/repos"
                  f"?per_page=100&page={page}&type=owner&sort=updated"
              )
              if not data:
                  break
              repos.extend(repo for repo in data if not repo.get("fork"))
              page += 1

          language_totals = {}
          for repo in repos:
              for language, size in github_api(repo["languages_url"]).items():
                  language_totals[language] = language_totals.get(language, 0) + size

          total_stars = sum(repo.get("stargazers_count", 0) for repo in repos)
          total_forks = sum(repo.get("forks_count", 0) for repo in repos)
          public_repos = len(repos)
          primary_language = max(language_totals, key=language_totals.get) if language_totals else "N/A"
          updated_at = max((repo.get("updated_at", "") for repo in repos), default="N/A")[:10]


          def write_stats_card(path):
              rows = [
                  ("Public repositories", str(public_repos)),
                  ("Stars", str(total_stars)),
                  ("Forks", str(total_forks)),
                  ("Primary language", primary_language),
                  ("Recently updated", updated_at),
              ]
              row_svg = "\n".join(
                  f'<text x="32" y="{82 + index * 24}" class="label">{html.escape(label)}</text>'
                  f'<text x="360" y="{82 + index * 24}" class="value">{html.escape(value)}</text>'
                  for index, (label, value) in enumerate(rows)
              )
              svg = f'''<svg xmlns="http://www.w3.org/2000/svg" width="495" height="195" viewBox="0 0 495 195" role="img" aria-labelledby="title desc">
            <title id="title">GitHub Stats</title>
            <desc id="desc">Repository summary for {html.escape(USERNAME)}.</desc>
            <style>
              .title {{ fill: #f0f6fc; font: 600 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }}
              .label {{ fill: #8b949e; font: 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }}
              .value {{ fill: #f0f6fc; font: 600 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; text-anchor: end; }}
            </style>
            <rect width="495" height="195" rx="6" fill="#0d1117" stroke="#30363d" />
            <text x="32" y="42" class="title">GitHub Stats</text>
          {row_svg}
          </svg>
          '''
              with open(path, "w", encoding="utf-8") as file:
                  file.write(svg)


          def write_languages_card(path):
              total = sum(language_totals.values())
              top_languages = sorted(language_totals.items(), key=lambda item: item[1], reverse=True)[:6]
              colors = ["#58a6ff", "#f1e05a", "#79c0ff", "#f0883e", "#7ee787", "#a371f7"]
              rows = []
              bars = []
              x_offset = 20
              for index, (language, size) in enumerate(top_languages):
                  percent = (size / total * 100) if total else 0
                  rows.append(
                      f'<circle cx="26" cy="{78 + index * 18}" r="4" fill="{colors[index % len(colors)]}" />'
                      f'<text x="38" y="{82 + index * 18}" class="label">{html.escape(language)}</text>'
                      f'<text x="274" y="{82 + index * 18}" class="value">{percent:.1f}%</text>'
                  )
                  width = 260 * percent / 100
                  bars.append(
                      f'<rect x="{x_offset:.2f}" y="48" width="{width:.2f}" height="8" fill="{colors[index % len(colors)]}" />'
                  )
                  x_offset += width
              svg = f'''<svg xmlns="http://www.w3.org/2000/svg" width="300" height="165" viewBox="0 0 300 165" role="img" aria-labelledby="title desc">
            <title id="title">Top Languages</title>
            <desc id="desc">Top repository languages for {html.escape(USERNAME)}.</desc>
            <style>
              .title {{ fill: #f0f6fc; font: 600 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }}
              .label {{ fill: #8b949e; font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }}
              .value {{ fill: #f0f6fc; font: 600 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; text-anchor: end; }}
            </style>
            <rect width="300" height="165" rx="6" fill="#0d1117" stroke="#30363d" />
            <text x="20" y="34" class="title">Top Languages</text>
            <clipPath id="barClip"><rect x="20" y="48" width="260" height="8" rx="4" /></clipPath>
            <g clip-path="url(#barClip)">
              <rect x="20" y="48" width="260" height="8" fill="#21262d" />
              {''.join(bars)}
            </g>
            {''.join(rows)}
          </svg>
          '''
              with open(path, "w", encoding="utf-8") as file:
                  file.write(svg)


          write_stats_card("profile/stats.svg")
          write_languages_card("profile/top-langs.svg")
          PY

      - name: Commit generated cards
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "Update generated README cards"
          file_pattern: "profile/stats.svg profile/top-langs.svg"
